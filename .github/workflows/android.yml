name: Android CI and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          cmdline-tools-version: 14742923
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Test, lint, and build
        run: ./gradlew --no-daemon --console=plain testDebugUnitTest lintDebug assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: languagetool-android-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 14

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: reports-${{ github.sha }}
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
          overwrite: true
          retention-days: 14

  release:
    name: Build and publish signed release APK
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          cmdline-tools-version: 14742923
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Set release version
        id: version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$VERSION_NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            printf '%s\n' "Release tag must look like v1.2.3 or v1.2.3-beta.1." >&2
            exit 1
          fi
          printf 'APP_VERSION_NAME=%s\n' "$VERSION_NAME" >> "$GITHUB_ENV"
          printf 'APP_VERSION_CODE=%s\n' "$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          printf 'name=%s\n' "$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          for VALUE in "$KEYSTORE_BASE64" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            if [ -z "$VALUE" ]; then
              printf '%s\n' "Android release signing secrets are incomplete." >&2
              exit 1
            fi
          done

      - name: Lint and build release APK
        run: ./gradlew --no-daemon --console=plain lintRelease assembleRelease

      - name: Decode signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Align and sign release APK
        env:
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/36.0.0"
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="$RUNNER_TEMP/app-release-aligned.apk"
          RELEASE_APK="app/build/outputs/apk/release/LanguageTool-for-Android-${APP_VERSION_NAME}.apk"

          "$BUILD_TOOLS_DIR/zipalign" -P 16 -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
            --ks-pass env:ANDROID_RELEASE_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_RELEASE_KEY_PASSWORD \
            --out "$RELEASE_APK" \
            "$ALIGNED_APK"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs "$RELEASE_APK"
          (
            cd "$(dirname "$RELEASE_APK")"
            sha256sum "$(basename "$RELEASE_APK")" > "$(basename "$RELEASE_APK").sha256"
          )

      - name: Upload signed release artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: languagetool-android-${{ steps.version.outputs.name }}
          path: |
            app/build/outputs/apk/release/LanguageTool-for-Android-${{ steps.version.outputs.name }}.apk
            app/build/outputs/apk/release/LanguageTool-for-Android-${{ steps.version.outputs.name }}.apk.sha256
          if-no-files-found: error
          overwrite: true

      - name: Remove signing material
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks" "$RUNNER_TEMP/app-release-aligned.apk"

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download signed release artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: languagetool-android-${{ needs.release.outputs.version }}
          path: release

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APP_VERSION_NAME="${{ needs.release.outputs.version }}"
          RELEASE_APK="release/LanguageTool-for-Android-${APP_VERSION_NAME}.apk"
          CHECKSUM="${RELEASE_APK}.sha256"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$RELEASE_APK" "$CHECKSUM" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$RELEASE_APK" "$CHECKSUM" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "LanguageTool for Android ${APP_VERSION_NAME}" \
              --generate-notes
          fi
